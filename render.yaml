services:
  - type: web
    name: supercaly
    runtime: python
    plan: standard
    branch: main
    autoDeploy: true
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python start.py
    envVars:
      - key: DATABASE_URL
        value: sqlite:////var/data/events.db
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: supercaly-data
      mountPath: /var/data
      sizeGB: 1
